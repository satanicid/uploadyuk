<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#87CEEB">
<meta name="apple-mobile-web-app-status-bar-style" content="#87CEEB">
<meta name="msapplication-navbutton-color" content="#87CEEB">
<title>UploadYuk — Simple Media Hosting</title>  
<style>
:root {
--sky-blue: #87CEEB;
--deep-blue: #4A90E2;
--bg: #fdfdfd;
--text: #2c3e50;
--border: #d1d9e0;
}

body { 
font-family: 'Inter', -apple-system, sans-serif; 
background: var(--bg); 
color: var(--text); 
margin: 0;
padding: 20px;
display: flex;
justify-content: center;
position: relative; /* Penting untuk posisi absolut tombol dev */
}

.dev-link {
position: absolute;
top: 20px;
right: 20px;
transition: transform 0.2s ease;
}

.dev-link:hover {
transform: scale(1.1);
}

.dev-link img {
width: 32px;
height: 32px;
}

.container { 
width: 100%;
max-width: 650px; 
margin-top: 50px;
}

header { 
text-align: center; 
margin-bottom: 40px; 
}

h1 { 
color: var(--deep-blue); 
margin: 0; 
font-size: 2.5rem; 
font-weight: 800;
letter-spacing: -1px;
}

.tagline {
color: #7f8c8d;
font-size: 0.9rem;
margin-top: 5px;
}

.main-card {
background: #ffffff;
border: 1px solid var(--border);
border-radius: 16px;
padding: 30px;
box-shadow: 0 10px 25px rgba(0,0,0,0.03);
position: relative;
overflow: hidden;
}

.drop-zone {
border: 2px dashed var(--sky-blue);
padding: 60px 20px;
border-radius: 12px;
cursor: pointer;
background: #fbfdfe;
transition: all 0.3s ease;
text-align: center;
}

.drop-zone:hover { 
background: #f0faff; 
border-color: var(--deep-blue);
}

.drop-zone svg {
margin-bottom: 15px;
opacity: 0.7;
}

#result-area {
margin-top: 25px;
padding: 20px;
background: #f8fbff;
border-radius: 10px;
display: none;
border: 1px solid var(--sky-blue);
animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(10px); }
to { opacity: 1; transform: translateY(0); }
}

.url-box {
display: flex;
background: #fff;
border: 1px solid var(--border);
border-radius: 6px;
margin-top: 10px;
overflow: hidden;
}

.url-display {
flex: 1;
padding: 12px;
font-family: 'SFMono-Regular', Consolas, monospace;
font-size: 13px;
color: var(--deep-blue);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.btn-copy {
background: var(--deep-blue);
color: white;
border: none;
padding: 0 20px;
cursor: pointer;
font-weight: 600;
font-size: 13px;
transition: background 0.2s;
}

.btn-copy:active {
background: #2980b9;
}

.history { 
margin-top: 50px; 
}

.history h3 {
font-size: 1rem;
color: #95a5a6;
text-transform: uppercase;
letter-spacing: 1px;
border-bottom: 1px solid #eee;
padding-bottom: 10px;
}

.history-item {
display: flex;
justify-content: space-between;
align-items: center;
padding: 12px 5px;
border-bottom: 1px solid #f9f9f9;
}

.donate-button {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #fff;
    border: 1px solid var(--sky-blue);
    padding: 10px 15px;
    border-radius: 50px;
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
    z-index: 999;
}

.donate-button:hover {
    transform: translateY(-5px);
    border-color: var(--deep-blue);
    background: #f0faff;
}

.donate-button svg {
    width: 20px;
    height: 20px;
    fill: #87CEEB; /* Warna merah untuk icon hati */
}


.history-item a {
color: var(--deep-blue);
text-decoration: none;
font-size: 14px;
font-family: monospace;
}

.file-name {
font-size: 14px;
color: #555;
max-width: 200px;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
}

footer { 
text-align: center; 
margin-top: 60px; 
color: #bdc3c7; 
font-size: 12px; 
padding-bottom: 40px;
}

#status-text {
margin-top: 15px;
font-size: 13px;
color: var(--deep-blue);
font-weight: 500;
}
</style>
</head>
<body>

<a href="/docs" class="dev-link" title="API Documentation">
    <img src="dev.gif" alt="Developer Docs">
</a>

<a href="https://saweria.co/zackrylsen" target="_blank" class="donate-button" title="Dukung UploadYuk">

    <span>Donasi</span>
</a>


<div class="container">
<header>
<svg width="50" height="50" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M12 16L12 8" stroke="#4A90E2" stroke-width="2" stroke-linecap="round"/>
<path d="M9 11L12 8 15 11" stroke="#4A90E2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M20 16.7428C21.2215 15.734 22 14.2079 22 12.5C22 9.46243 19.5376 7 16.5 7C16.2815 7 16.0671 7.01281 15.857 7.03793C14.9221 4.60969 12.6618 3 10 3C6.68629 3 4 5.68629 4 9C4 9.17467 4.00743 9.34759 4.02199 9.51839C2.85148 10.432 2.1001 11.8293 2.1001 13.4C2.1001 16.2719 4.42821 18.6 7.3001 18.6H17" stroke="#87CEEB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
<h1>UploadYuk</h1>
<div class="tagline">Penyimpanan media instan dan aman</div>
</header>

<div class="main-card">
<div class="drop-zone" onclick="document.getElementById('fileInput').click()">
<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#cbd5e0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
<p style="margin:0; font-weight: 500;">Pilih file untuk diunggah</p>
<p style="margin:5px 0 0; font-size: 12px; color: #94a3b8;">Gambar, Video, atau Zip</p>
<input type="file" id="fileInput" hidden onchange="handleUpload()">
</div>

<div id="status-text" style="text-align:center;"></div>

<div id="result-area">
<span style="font-size: 12px; font-weight: 600; color: #7f8c8d;">LINK BERHASIL DIBUAT:</span>
<div class="url-box">
<div id="urlPath" class="url-display"></div>
<button class="btn-copy" id="copyBtn" onclick="copyToClipboard()">SALIN</button>
</div>
</div>
</div>

<footer>
Dibuat dengan dedikasi oleh <strong>Zack Rylsen</strong>
</footer>
</div>

<script>
async function handleUpload() {
const input = document.getElementById('fileInput');
const status = document.getElementById('status-text');
const resultArea = document.getElementById('result-area');
const urlPath = document.getElementById('urlPath');

if (input.files.length === 0) return;

const formData = new FormData();
formData.append('media', input.files[0]);

status.innerText = 'Sedang memproses...';
resultArea.style.display = 'none';

try {
const res = await fetch('/api/v1/upload', { method: 'POST', body: formData });
const data = await res.json();

const fullUrl = `${window.location.origin}/${data.generatedName}`;

status.innerText = '';
resultArea.style.display = 'block';
urlPath.innerText = fullUrl;

input.value = '';
fetchList();
} catch (err) {
status.innerText = 'Gagal mengunggah file.';
status.style.color = '#e74c3c';
}
}

async function fetchList() {
try {
const res = await fetch('/api/list');
const data = await res.json();
const listDiv = document.getElementById('list');
if (!listDiv) return;
listDiv.innerHTML = data.reverse().slice(0, 10).map(f => `
<div class="history-item">
<span class="file-name">${f.originalName}</span>
<a href="/${f.generatedName}" target="_blank">/${f.generatedName}</a>
</div>
`).join('');
} catch (e) {}
}

function copyToClipboard() {
const text = document.getElementById('urlPath').innerText;
const btn = document.getElementById('copyBtn');

navigator.clipboard.writeText(text).then(() => {
const originalText = btn.innerText;
btn.innerText = 'TERSALIN!';
btn.style.background = '#2ecc71';

setTimeout(() => {
btn.innerText = originalText;
btn.style.background = '';
}, 2000);
});
}

fetchList();
</script>
</body>
